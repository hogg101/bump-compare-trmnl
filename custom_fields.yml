- keyname: due_date
  field_type: string
  name: Due Date
  description: Estimated due date
  placeholder: YYYY-MM-DD
  optional: true

- keyname: author_bio
  field_type: author_bio
  name: About This Plugin
  category: life,personal
  description: "Pregnancy Bump Compare shows your current pregnancy week with a familiar fruit/veg size comparison, plus estimated baby length and weight. Enter your due date (YYYY-MM-DD), then optionally choose locale (UK/US naming) and units (metric/imperial). If units are not set, the plugin defaults from locale. This plugin is informational only and not medical advice."
  email_address: [email protected]
  github_url: https://github.com/hogg101/bump-compare-trmnl
  learn_more_url: https://www.jameshogg.tech

- keyname: locale
  field_type: select
  name: Locale
  description: Needed to show familiar comparator names (e.g., courgette vs zucchini) and set default units
  options:
    - UK English: en-GB
    - US English: en-US
  default: en-GB
  optional: true

- keyname: units
  field_type: select
  name: Units
  description: Measurement units
  options:
    - Metric: metric
    - Imperial: imperial
  default: metric
  optional: true
