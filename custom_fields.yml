- keyname: due_date
  field_type: string
  name: Due Date
  description: Estimated due date
  placeholder: YYYY-MM-DD
  optional: true

- keyname: author_bio
  field_type: author_bio
  name: About the Creator
  category: life,personal
  description: London-based systems integrator and CTO at Twisted Pear, focused on networking, WiFi, surveillance, and automation/control systems for lighting and AV.
  email_address: [email protected]
  github_url: https://github.com/hogg101/bump-compare-trmnl
  learn_more_url: https://www.jameshogg.tech

- keyname: locale
  field_type: select
  name: Locale
  description: Needed to show familiar comparator names (e.g., courgette vs zucchini) and set default units
  options:
    - UK English: en-GB
    - US English: en-US
  default: en-GB
  optional: true

- keyname: units
  field_type: select
  name: Units
  description: Measurement units
  options:
    - Metric: metric
    - Imperial: imperial
  default: metric
  optional: true
